<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlanoSnap - v3.2 Pro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f0f0f0;
            margin: 0;
            padding: 0;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        .controles {
            flex-shrink: 0;
            margin: 5px 5px 0 5px;
            padding: 10px;
            background: white;
            border-radius: 8px;
            display: inline-block;
            text-align: left;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 95vw;
            max-height: 40vh;
            overflow-y: auto;
        }

        button {
            padding: 8px 10px;
            margin: 2px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f9f9f9;
            cursor: pointer;
        }

        button:disabled {
            background: #eee;
            color: #aaa;
            cursor: default;
        }

        button.activo {
            background: #007bff;
            color: white;
            border-color: #0056b3;
        }

        button.peligro {
            background: #ffdddd;
            color: #900;
            border-color: #ff9999;
        }

        input,
        textarea,
        select {
            padding: 8px;
            margin: 5px;
            font-size: 14px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100px;
        }

        textarea {
            width: 100%;
            resize: vertical;
            min-height: 40px;
            font-family: Arial, sans-serif;
        }

        .botonera {
            margin-top: 10px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }

        .fila {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }

        #panelEdicion {
            background: #e6f7ff;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
            border: 1px solid #b3d9ff;
        }

        #panelAplanar {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
            border: 1px solid #ccc;
        }

        .titulo-seccion {
            font-size: 11px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
        }

        .mesa-header {
            background: #2c3e50;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .mesa-header input {
            background: #ecf0f1;
            color: #333;
            border: none;
            font-weight: bold;
        }

        .vista-nav {
            background: #34495e;
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            flex-wrap: wrap;
        }

        #canvasContainer {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background: #333;
            margin: 5px;
            border-radius: 5px;
        }

        #miCanvas {
            background: #eee;
            touch-action: none;
            cursor: crosshair;
            display: block;
        }

        #estado {
            font-weight: bold;
            color: #555;
            margin: 5px;
            display: block;
            font-size: 13px;
            flex-shrink: 0;
            height: 20px;
            line-height: 20px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        #resultado {
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin: 0 5px 10px 5px;
            height: 40px;
            font-family: monospace;
            background: #e9ecef;
            padding: 8px;
            border-radius: 4px;
            word-wrap: break-word;
            overflow: hidden;
            flex-shrink: 0;
        }

        #loading {
            color: red;
            font-size: 20px;
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
        }

        #lupaCanvas {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            pointer-events: none;
            display: none;
            background: #000;
        }
    </style>
</head>

<body>
    <div class="controles" style="max-width: 600px;">
        <div class="mesa-header">
            <div class="fila">
                <input type="text" id="inputNombreMesa" placeholder="Nombre del Trabajo" style="flex: 1; width: auto;">
                <button id="btnGuardarMesa" title="Guardar">💾</button>
                <button id="btnCargarMesa" title="Cargar">📂</button>
                <select id="selectMesaCargar" style="display:none; flex:1; font-size:13px; padding:8px; color: #333;">
                    <option value="-1">-- Selecciona --</option>
                </select>
                <button id="btnCancelarCarga" style="display:none;" class="peligro">✖</button>
                <button id="btnBorrarMesa" style="display:none;" class="peligro" title="Borrar">🗑️</button>
                <button id="btnExportarMesa" title="Exportar">📤</button>
                <button id="btnImportarMesa" title="Importar">📥</button>
                <input type="file" id="inputArchivoMesa" accept=".planosnap,.json" style="display: none;">
            </div>
        </div>
        <div class="vista-nav" id="navVistas">
            <button id="btnVistaAnt" style="background:#2c3e50; color:white; border-color:white;">◀</button>
            <div style="text-align:center; flex:1; min-width: 150px;">
                <div id="txtVistaActual" style="font-weight:bold;">Sin vistas</div>
                <input type="text" id="inputNombreVista" placeholder="Nombre Vista"
                    style="width: 80%; text-align:center; font-size:12px; margin:2px;">
                <textarea id="inputNotasVista" placeholder="Notas..." rows="1"
                    style="font-size:11px; margin-top:4px;"></textarea>
            </div>
            <button id="btnVistaSig" style="background:#2c3e50; color:white; border-color:white;">▶</button>
            <button id="btnAddVista" style="background:#27ae60; color:white; border:none; margin-left:5px;"
                title="Añadir foto">+ Foto</button>
        </div>
        <span id="estado">Pulsa '+ Foto' para empezar.</span>
        <input type="file" id="inputImagen" accept="image/*" style="display: none;">

        <div class="botonera" id="herramientas" style="display:none;">
            <div class="titulo-seccion">Herramientas</div>
            <div class="fila">
                <button id="btnDibujar" class="activo">📏 Dibujar</button>
                <button id="btnAngulo">📐 Angulo</button>
                <button id="btnSeleccionar">✏️ Editar</button>
                <button id="btnDeshacer">⬅ Deshacer</button>
                <button id="btnLimpiarVista" class="peligro">🗑️ Borrar Vista</button>
            </div>
            <div class="fila" style="margin-top:5px;">
                <button id="btnMover">✋ Mover</button>
                <button id="btnZoomIn">🔍+</button>
                <button id="btnZoomOut">🔍-</button>
                <button id="btnAplanarToggle">📐 Aplanar</button>
                <button id="btnToggleLineas" class="activo" title="Ver/Ocultar Líneas">🟢 Líneas</button>
                <button id="btnToggleTextos" class="activo" title="Ver/Ocultar Números">🟢 Textos</button>
            </div>

            <div id="panelEdicion">
                <strong>Cota Seleccionada:</strong><br>
                <span>Yo digo (cm):</span> <input type="number" id="inputManual" step="0.1" placeholder="Manual">
                <button id="btnAplicarManual">Aplicar</button>
                <button id="btnBorrarManual" class="peligro">Borrar</button>
                <br>
                <span>Nota:</span> <input type="text" id="inputNotaCota" placeholder="Ej: Altura zócalo"
                    style="width: 140px;">
                <button id="btnAplicarNota">Ok</button>
                <button id="btnBorrarNota" class="peligro">X</button>
            </div>

            <div id="panelAplanar">
                <div class="titulo-seccion">Calibración de Perspectiva</div>
                <div class="fila">
                    <span>Medida 1:</span> <input type="number" id="anchoReal" step="0.1">
                    <span>Medida 2:</span> <input type="number" id="altoReal" step="0.1">
                </div>
                <button id="btnAplanar" disabled style="width:100%; margin-top:5px;">Calcular y Aplanar</button>
            </div>
        </div>
    </div>
    <div id="canvasContainer">
        <canvas id="miCanvas" width="800" height="600"></canvas>
        <div id="loading">Cargando motor IA...</div>
    </div>
    <span id="estado">Esperando...</span>
    <div id="resultado">Sin cotas.</div>
    <canvas id="lupaCanvas" width="300" height="300"></canvas>

    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
    <script>
        const canvas = document.getElementById('miCanvas'); const ctx = canvas.getContext('2d');
        const lupaCanvas = document.getElementById('lupaCanvas'); const lupaCtx = lupaCanvas.getContext('2d');

        let imagenCargada = null, bloquearClics = false, isFlattened = false;
        let cotas = [], angulos = [], tempPuntos = [], modoCota = 'dibujar', cotaSeleccionadaIdx = -1, calibracionMode = false;
        let isDraggingEndpoint = false, draggingCotaIdx = -1, draggingPointIdx = -1;
        let scale = 1, offsetX = 0, offsetY = 0, modoMover = false, arrastrando = false, startDragX, startDragY;
        let isPointing = false, currentImgX = 0, currentImgY = 0, currentScreenX = 0, currentScreenY = 0, pixelesPorCm = 1;
        let lastValidLockedPoint = null, isAnchoredVisually = false, lockTimer = null, pointerIsDown = false;
        const LOCK_DELAY = 500, MAX_HISTORIAL = 15, LUPA_ZOOM = 2.5;
        let verLineas = true, verTextos = true, cambiosSinGuardar = false;

        let mesaActual = { nombre: "Sin título", vistas: [] }; let vistaActualIdx = -1, historial = []; let db;
        function iniciarDB() { let r = indexedDB.open("PlanoSnapDB", 1); r.onupgradeneeded = e => e.target.result.createObjectStore("mesas", { keyPath: "id" }); r.onsuccess = e => db = e.target.result; } iniciarDB();

        function sincronizarVistaActual() { if (vistaActualIdx < 0 || !imagenCargada) return; let v = mesaActual.vistas[vistaActualIdx]; v.nombre = document.getElementById('inputNombreVista').value || `Vista ${vistaActualIdx + 1}`; v.notas = document.getElementById('inputNotasVista').value; v.cotas = JSON.parse(JSON.stringify(cotas)); v.angulos = JSON.parse(JSON.stringify(angulos)); v.isFlattened = isFlattened; v.pixelesPorCm = pixelesPorCm; }

        function cargarVistaEnCanvas(idx) {
            if (idx < 0 || idx >= mesaActual.vistas.length) return; vistaActualIdx = idx; bloquearClics = true; document.getElementById('estado').innerText = "Cargando vista...";
            let v = mesaActual.vistas[idx], imgTemp = new Image();
            imgTemp.onload = () => {
                imagenCargada = imgTemp; canvas.width = imgTemp.width; canvas.height = imgTemp.height;

                // FALLBACKS: Si cargamos un archivo viejo sin ángulos o notas, los inicializamos vacíos
                cotas = JSON.parse(JSON.stringify(v.cotas || [])).map(c => ({ ...c, nota: c.nota || "" }));
                angulos = JSON.parse(JSON.stringify(v.angulos || []));

                isFlattened = v.isFlattened; pixelesPorCm = v.pixelesPorCm;
                let inpNom = document.getElementById('inputNombreVista'); inpNom.value = v.nombre; inpNom.blur(); let inpNot = document.getElementById('inputNotasVista'); inpNot.value = v.notas || ""; inpNot.blur();
                historial = []; guardarEstado(); cotaSeleccionadaIdx = -1; tempPuntos = []; calibracionMode = false; window.tempAngulo = [];
                document.getElementById('panelAplanar').style.display = 'none'; document.getElementById('btnAplanarToggle').classList.remove('activo');
                mostrarPanelEdicion(-1); document.getElementById('herramientas').style.display = 'block'; centrarImagen(); dibujar(); bloquearClics = false; actualizarUIVistas(); document.getElementById('estado').innerText = `Modo Dibujo. (${v.nombre})`;
            }; imgTemp.src = v.imagenSrc;
        }
        function actualizarUIVistas() { document.getElementById('txtVistaActual').innerText = vistaActualIdx >= 0 ? `${vistaActualIdx + 1} / ${mesaActual.vistas.length}` : "Sin vistas"; }
        document.getElementById('btnAddVista').addEventListener('click', () => { sincronizarVistaActual(); document.getElementById('inputImagen').click(); });
        document.getElementById('inputImagen').addEventListener('change', e => { const f = e.target.files[0]; if (!f) return; const i = new Image(); i.onload = () => { let tc = document.createElement('canvas'); tc.width = i.width; tc.height = i.height; tc.getContext('2d').drawImage(i, 0, 0); let u = tc.toDataURL('image/jpeg', 0.8); mesaActual.vistas.push({ id: Date.now(), nombre: `Vista ${mesaActual.vistas.length + 1}`, notas: "", imagenSrc: u, isFlattened: false, pixelesPorCm: 1, cotas: [], angulos: [] }); vistaActualIdx = mesaActual.vistas.length - 1; imagenCargada = i; canvas.width = i.width; canvas.height = i.height; cotas = []; angulos = []; tempPuntos = []; modoCota = 'dibujar'; bloquearClics = false; cotaSeleccionadaIdx = -1; calibracionMode = false; isFlattened = false; window.tempP1 = null; window.tempAngulo = []; historial = []; guardarEstado(); document.getElementById('inputNombreMesa').value = mesaActual.nombre; document.getElementById('inputNombreVista').value = mesaActual.vistas[vistaActualIdx].nombre; document.getElementById('inputNotasVista').value = ""; document.getElementById('herramientas').style.display = 'block'; document.getElementById('btnAplanar').disabled = true; document.getElementById('btnAplanarToggle').classList.remove('activo'); document.getElementById('panelAplanar').style.display = 'none'; document.getElementById('panelEdicion').style.display = 'none'; centrarImagen(); actualizarUIVistas(); dibujar(); document.getElementById('estado').innerText = "Modo Dibujo."; }; i.src = URL.createObjectURL(f); e.target.value = ""; });
        document.getElementById('btnVistaAnt').addEventListener('click', () => { if (vistaActualIdx > 0) { sincronizarVistaActual(); cargarVistaEnCanvas(vistaActualIdx - 1); } });
        document.getElementById('btnVistaSig').addEventListener('click', () => { if (vistaActualIdx < mesaActual.vistas.length - 1) { sincronizarVistaActual(); cargarVistaEnCanvas(vistaActualIdx + 1); } });

        document.getElementById('btnGuardarMesa').addEventListener('click', () => { if (!mesaActual.vistas.length) { alert("No hay vistas."); return; } sincronizarVistaActual(); mesaActual.nombre = document.getElementById('inputNombreMesa').value || "Sin título"; mesaActual.id = mesaActual.id || Date.now(); db.transaction("mesas", "readwrite").objectStore("mesas").put(mesaActual); cambiosSinGuardar = false; document.getElementById('estado').innerText = `¡Mesa guardada!`; });

        document.getElementById('btnCargarMesa').onclick = () => { db.transaction("mesas", "readonly").objectStore("mesas").getAll().onsuccess = e => { let m = e.target.result; if (!m.length) { alert("No hay trabajos."); return; } let s = document.getElementById('selectMesaCargar'); s.innerHTML = '<option value="-1">-- Selecciona --</option>'; m.forEach((x, i) => { let o = document.createElement('option'); o.value = i; o.textContent = `${x.nombre} (${x.vistas.length} vistas)`; s.appendChild(o); }); document.getElementById('btnCargarMesa').style.display = 'none'; s.style.display = 'block'; document.getElementById('btnCancelarCarga').style.display = 'block'; document.getElementById('btnBorrarMesa').style.display = 'block'; }; };
        document.getElementById('selectMesaCargar').addEventListener('change', e => { let i = parseInt(e.target.value); if (i < 0) return; db.transaction("mesas", "readonly").objectStore("mesas").getAll().onsuccess = ev => { let m = ev.target.result; if (i >= 0 && i < m.length) { mesaActual = m[i]; vistaActualIdx = 0; document.getElementById('inputNombreMesa').value = m[i].nombre; cargarVistaEnCanvas(0); } ocultarSelectorCarga(); }; });
        document.getElementById('btnCancelarCarga').addEventListener('click', ocultarSelectorCarga);
        document.getElementById('btnBorrarMesa').addEventListener('click', () => { let i = parseInt(document.getElementById('selectMesaCargar').value); if (i < 0) { alert("Selecciona un proyecto."); return; } if (!confirm("¿Borrar proyecto?")) return; db.transaction("mesas", "readonly").objectStore("mesas").getAll().onsuccess = e => { let m = e.target.result; if (i >= 0 && i < m.length) { let b = m[i]; db.transaction("mesas", "readwrite").objectStore("mesas").delete(b.id).onsuccess = () => { if (mesaActual.id === b.id) { mesaActual = { nombre: "Sin título", vistas: [] }; vistaActualIdx = -1; imagenCargada = null; cotas = []; angulos = []; historial = []; cambiosSinGuardar = false; ctx.clearRect(0, 0, canvas.width, canvas.height); document.getElementById('herramientas').style.display = 'none'; document.getElementById('inputNombreMesa').value = ""; actualizarUIVistas(); actualizarResultado(); } document.getElementById('estado').innerText = "Proyecto borrado."; cargarListaMesas(); } }; }; });
        function ocultarSelectorCarga() { document.getElementById('btnCargarMesa').style.display = 'block'; document.getElementById('selectMesaCargar').style.display = 'none'; document.getElementById('btnCancelarCarga').style.display = 'none'; document.getElementById('btnBorrarMesa').style.display = 'none'; }

        document.getElementById('btnExportarMesa').addEventListener('click', () => { if (!mesaActual.vistas.length) return; sincronizarVistaActual(); let b = new Blob([JSON.stringify(mesaActual)], { type: "application/json" }), u = URL.createObjectURL(b), a = document.createElement('a'); a.href = u; a.download = `${mesaActual.nombre.replace(/[^a-zA-Z0-9]/g, '_')}.planosnap`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); cambiosSinGuardar = false; document.getElementById('estado').innerText = `¡Exportado!`; });
        document.getElementById('btnImportarMesa').addEventListener('click', () => document.getElementById('inputArchivoMesa').click());

        document.getElementById('btnImportarMesa').addEventListener('click', () => document.getElementById('inputArchivoMesa').click());
        document.getElementById('inputArchivoMesa').addEventListener('change', e => {
            let f = e.target.files[0]; if (!f) return;
            let r = new FileReader();
            r.onload = ev => {
                try {
                    let m = JSON.parse(ev.target.result);
                    if (!m.vistas || !m.vistas.length) { alert("No válido."); return; }

                    // FALLBACK: Aseguramos que las vistas viejas tengan los nuevos arrays
                    m.vistas.forEach(v => {
                        if (!v.angulos) v.angulos = [];
                        if (!v.cotas) v.cotas = [];
                        v.cotas.forEach(c => { if (!c.nota) c.nota = ""; if (!c.isVisible) c.isVisible = true; });
                    });

                    mesaActual = m; vistaActualIdx = 0; document.getElementById('inputNombreMesa').value = m.nombre; cargarVistaEnCanvas(0);
                } catch (err) { alert("Error al leer: " + err.message); }
            };
            r.readAsText(f);
            e.target.value = "";
        });

        document.getElementById('btnLimpiarVista').addEventListener('click', () => { if (!confirm("¿Borrar cotas y ángulos?") || (!cotas.length && !angulos.length)) return; guardarEstado(); cotas = []; angulos = []; cotaSeleccionadaIdx = -1; window.tempP1 = null; document.getElementById('panelEdicion').style.display = 'none'; actualizarResultado(); dibujar(); });

        function guardarEstado() { if (vistaActualIdx < 0) return; cambiosSinGuardar = true; historial.push({ cotas: JSON.parse(JSON.stringify(cotas)), angulos: JSON.parse(JSON.stringify(angulos)), isFlattened, pixelesPorCm, imgSrc: imagenCargada.src }); if (historial.length > MAX_HISTORIAL) historial.shift(); }
        function onOpenCvReady() { document.getElementById('loading').style.display = 'none'; }

        document.getElementById('btnMover').addEventListener('click', function () { modoMover = !modoMover; this.classList.toggle('activo'); canvas.style.cursor = modoMover ? 'grab' : 'crosshair'; });
        document.getElementById('btnZoomIn').addEventListener('click', () => { scale *= 1.3; dibujar(); });
        document.getElementById('btnZoomOut').addEventListener('click', () => { scale /= 1.3; if (scale < 0.5) scale = 0.5; dibujar(); });
        document.getElementById('btnAplanarToggle').addEventListener('click', function () { calibracionMode = !calibracionMode; this.classList.toggle('activo'); document.getElementById('panelAplanar').style.display = calibracionMode ? 'block' : 'none'; if (calibracionMode) { tempPuntos = []; document.getElementById('estado').innerText = "MODO CALIBRACIÓN: 4 esquinas."; } else { tempPuntos = []; document.getElementById('btnAplanar').disabled = true; document.getElementById('estado').innerText = "Modo Dibujo."; } dibujar(); });

        document.getElementById('btnDibujar').addEventListener('click', function () { calibracionMode = false; document.getElementById('panelAplanar').style.display = 'none'; document.getElementById('btnAplanarToggle').classList.remove('activo'); document.getElementById('btnAngulo').classList.remove('activo'); modoCota = 'dibujar'; this.classList.add('activo'); document.getElementById('btnSeleccionar').classList.remove('activo'); document.getElementById('panelEdicion').style.display = 'none'; cotaSeleccionadaIdx = -1; canvas.style.cursor = 'crosshair'; tempPuntos = []; window.tempP1 = null; window.tempAngulo = []; document.getElementById('estado').innerText = "Modo Dibujo."; dibujar(); });
        document.getElementById('btnAngulo').addEventListener('click', function () { calibracionMode = false; document.getElementById('panelAplanar').style.display = 'none'; document.getElementById('btnAplanarToggle').classList.remove('activo'); document.getElementById('btnDibujar').classList.remove('activo'); document.getElementById('btnSeleccionar').classList.remove('activo'); document.getElementById('panelEdicion').style.display = 'none'; cotaSeleccionadaIdx = -1; canvas.style.cursor = 'crosshair'; tempPuntos = []; window.tempP1 = null; window.tempAngulo = []; modoCota = 'angulo'; this.classList.add('activo'); document.getElementById('estado').innerText = "Modo Ángulo. Toca vértice, brazo 1 y brazo 2."; dibujar(); });
        document.getElementById('btnSeleccionar').addEventListener('click', function () { calibracionMode = false; document.getElementById('panelAplanar').style.display = 'none'; document.getElementById('btnAplanarToggle').classList.remove('activo'); document.getElementById('btnDibujar').classList.remove('activo'); document.getElementById('btnAngulo').classList.remove('activo'); modoCota = 'seleccionar'; this.classList.add('activo'); cotaSeleccionadaIdx = -1; document.getElementById('estado').innerText = "Modo Edición."; canvas.style.cursor = 'pointer'; dibujar(); });

        document.getElementById('btnAplicarManual').addEventListener('click', () => { if (cotaSeleccionadaIdx >= 0) { guardarEstado(); cotas[cotaSeleccionadaIdx].manualCm = document.getElementById('inputManual').value === "" ? null : parseFloat(document.getElementById('inputManual').value); mostrarPanelEdicion(cotaSeleccionadaIdx); actualizarResultado(); dibujar(); } });
        document.getElementById('btnBorrarManual').addEventListener('click', () => { if (cotaSeleccionadaIdx >= 0) { guardarEstado(); cotas[cotaSeleccionadaIdx].manualCm = null; mostrarPanelEdicion(cotaSeleccionadaIdx); actualizarResultado(); dibujar(); } });

            let il = isAnchoredVisually, cm = il ? '#00ff00' : 'red', gb = il ? 8 : 5;
            lupaCtx.beginPath(); lupaCtx.arc(cx, cy, r, 0, Math.PI * 2); lupaCtx.strokeStyle = il ? '#00ff00' : 'white'; lupaCtx.lineWidth = gb; lupaCtx.stroke(); lupaCtx.strokeStyle = il ? '#005500' : '#333'; lupaCtx.lineWidth = 2; lupaCtx.stroke();
            let tm = 20; lupaCtx.strokeStyle = cm; lupaCtx.lineWidth = 2.5;
            lupaCtx.beginPath(); lupaCtx.moveTo(cx - tm, cy); lupaCtx.lineTo(cx - 6, cy); lupaCtx.stroke(); lupaCtx.beginPath(); lupaCtx.moveTo(cx + 6, cy); lupaCtx.lineTo(cx + tm, cy); lupaCtx.stroke(); lupaCtx.beginPath(); lupaCtx.moveTo(cx, cy - tm); lupaCtx.lineTo(cx, cy - 6); lupaCtx.stroke(); lupaCtx.beginPath(); lupaCtx.moveTo(cx, cy + 6); lupaCtx.lineTo(cx, cy + tm); lupaCtx.stroke();
            lupaCtx.fillStyle = cm; lupaCtx.beginPath(); lupaCtx.arc(cx, cy, 2.5, 0, Math.PI * 2); lupaCtx.fill();
            if (il) { lupaCtx.font = "bold 14px Arial"; lupaCtx.fillStyle = '#00ff00'; lupaCtx.textAlign = 'center'; lupaCtx.textBaseline = 'middle'; lupaCtx.fillText("ANCLADO", cx, cy + 35); }
        }

        function aplanarPlano() {
            if (tempPuntos.length !== 4 || typeof cv === 'undefined') { alert("Faltan 4 puntos o OpenCV."); return; }
            let i1 = parseFloat(document.getElementById('anchoReal').value), i2 = parseFloat(document.getElementById('altoReal').value);
            if (isNaN(i1) || isNaN(i2)) { alert("Introduce medidas reales."); return; }
            bloquearClics = true; document.getElementById('estado').innerText = "Calculando...";
            setTimeout(() => {
                try {
                    let tc = document.createElement('canvas'); tc.width = imagenCargada.width; tc.height = imagenCargada.height; let tctx = tc.getContext('2d'); tctx.drawImage(imagenCargada, 0, 0); let src = cv.imread(tc);
                    let st = cv.matFromArray(4, 1, cv.CV_32FC2, [tempPuntos[0].x, tempPuntos[0].y, tempPuntos[1].x, tempPuntos[1].y, tempPuntos[2].x, tempPuntos[2].y, tempPuntos[3].x, tempPuntos[3].y]);
                    let dt = Math.hypot(tempPuntos[1].x - tempPuntos[0].x, tempPuntos[1].y - tempPuntos[0].y), dl = Math.hypot(tempPuntos[3].x - tempPuntos[0].x, tempPuntos[3].y - tempPuntos[0].y);
                    if (dt > dl && i1 < i2) { let t = i1; i1 = i2; i2 = t; } else if (dt < dl && i1 > i2) { let t = i1; i1 = i2; i2 = t; }
                    let ei = (window.innerWidth - 40) / i1, dtr = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, i1 * ei, 0, i1 * ei, i2 * ei, 0, i2 * ei]);
                    let M = cv.getPerspectiveTransform(st, dtr), eo = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, src.cols, 0, src.cols, src.rows, 0, src.rows]), et = new cv.Mat(); cv.perspectiveTransform(eo, et, M);
                    let mnx = Infinity, mny = Infinity, mxx = -Infinity, mxy = -Infinity;
                    for (let i = 0; i < 4; i++) { let x = et.data32F[i * 2], y = et.data32F[i * 2 + 1]; if (x < mnx) mnx = x; if (x > mxx) mxx = x; if (y < mny) mny = y; if (y > mxy) mxy = y; }
                    let at = Math.ceil(mxx - mnx), aalt = Math.ceil(mxy - mny), mp = 4096, ss = 1.0;
                    if (at > mp || aalt > mp) { ss = Math.min(mp / at, mp / aalt); }
                    let na = Math.ceil(at * ss), nalt = Math.ceil(aalt * ss); pixelesPorCm = ei * ss;
                    let T = cv.matFromArray(3, 3, cv.CV_64FC1, [1, 0, -mnx, 0, 1, -mny, 0, 0, 1]), TS = cv.matFromArray(3, 3, cv.CV_64FC1, [ss, 0, 0, 0, ss, 0, 0, 0, 1]);
                    let MF = new cv.Mat(), tm = new cv.Mat(), em1 = new cv.Mat(), em2 = new cv.Mat(); cv.gemm(TS, T, 1, em1, 0, tm); cv.gemm(tm, M, 1, em2, 0, MF); em1.delete(); em2.delete();

                    if (cotas.length > 0) { let pa = []; cotas.forEach(c => { pa.push(c.p1.x, c.p1.y, c.p2.x, c.p2.y); }); let sc = cv.matFromArray(cotas.length * 2, 1, cv.CV_32FC2, pa), dc = new cv.Mat(); cv.perspectiveTransform(sc, dc, MF); for (let i = 0; i < cotas.length; i++) { cotas[i].p1.x = dc.data32F[i * 4]; cotas[i].p1.y = dc.data32F[i * 4 + 1]; cotas[i].p2.x = dc.data32F[i * 4 + 2]; cotas[i].p2.y = dc.data32F[i * 4 + 3]; cotas[i].calcCm = Math.hypot(cotas[i].p2.x - cotas[i].p1.x, cotas[i].p2.y - cotas[i].p1.y) / pixelesPorCm; } sc.delete(); dc.delete(); }

                    // TRANSFORMAR ÁNGULOS
                    if (angulos.length > 0) {
                        let paA = []; angulos.forEach(a => { paA.push(a.p1.x, a.p1.y, a.p2.x, a.p2.y, a.p3.x, a.p3.y); });
                        let scA = cv.matFromArray(angulos.length * 3, 1, cv.CV_32FC2, paA), dcA = new cv.Mat(); cv.perspectiveTransform(scA, dcA, MF);
                        for (let i = 0; i < angulos.length; i++) {
                            angulos[i].p1.x = dcA.data32F[i * 6]; angulos[i].p1.y = dcA.data32F[i * 6 + 1]; angulos[i].p2.x = dcA.data32F[i * 6 + 2]; angulos[i].p2.y = dcA.data32F[i * 6 + 3]; angulos[i].p3.x = dcA.data32F[i * 6 + 4]; angulos[i].p3.y = dcA.data32F[i * 6 + 5];

                            // Recalcular ángulo con la nueva perspectiva
                            let v1x = angulos[i].p2.x - angulos[i].p1.x, v1y = angulos[i].p2.y - angulos[i].p1.y, v2x = angulos[i].p3.x - angulos[i].p1.x, v2y = angulos[i].p3.y - angulos[i].p1.y;
                            let cross = v1x * v2y - v1y * v2x;
                            let a1 = Math.atan2(v1y, v1x), a2 = Math.atan2(v2y, v2x);
                            let deg = (a1 - a2) * (180 / Math.PI);
                            if (cross > 0) deg -= 360;
                            if (deg < 0) deg += 360;
                            angulos[i].calcDeg = deg;
                        }
                        scA.delete(); dcA.delete();
                    }

                    let dst = new cv.Mat(); cv.warpPerspective(src, dst, MF, new cv.Size(na, nalt), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
                    canvas.width = na; canvas.height = nalt; cv.imshow(canvas, dst); let nid = canvas.toDataURL('image/png'); imagenCargada = new Image();
                    imagenCargada.onload = () => { isFlattened = true; bloquearClics = false; tempPuntos = []; calibracionMode = false; document.getElementById('panelAplanar').style.display = 'none'; document.getElementById('btnAplanarToggle').classList.remove('activo'); if (vistaActualIdx >= 0) mesaActual.vistas[vistaActualIdx].imagenSrc = nid; document.getElementById('estado').innerText = "¡Aplanado!"; actualizarResultado(); centrarImagen(); dibujar(); };
                    imagenCargada.src = nid; src.delete(); dst.delete(); M.delete(); MF.delete(); T.delete(); TS.delete(); tm.delete(); st.delete(); dtr.delete(); eo.delete(); et.delete();
                } catch (err) { alert("Error: " + err.message); document.getElementById('estado').innerText = "Error."; } finally { bloquearClics = false; }
            }, 100);
        }
    </script>

    <script>
      // Mostrar botón de instalación cuando el navegador lo solicite
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Mostrar botón de instalación
        const installButton = document.createElement('button');
        installButton.id = 'installButton';
        installButton.textContent = 'Instalar PlanoSnap';
        installButton.style.position = 'fixed';
        installButton.style.bottom = '20px';
        installButton.style.right = '20px';
        installButton.style.zIndex = '1000';
        installButton.style.padding = '10px 20px';
        installButton.style.background = '#2c3e50';
        installButton.style.color = 'white';
        installButton.style.border = 'none';
        installButton.style.borderRadius = '5px';
        installButton.style.cursor = 'pointer';
        document.body.appendChild(installButton);
        
        installButton.addEventListener('click', () => {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              console.log('Usuario aceptó la instalación');
            }
            deferredPrompt = null;
            installButton.remove();
          });
        });
      });
    </script>

        let imagenCargada = null, bloquearClics = false, isFlattened = false;

        let mesaActual = { nombre: "Sin título", vistas: [] }; let vistaActualIdx = -1, historial = []; let db;
        function iniciarDB() { let r = indexedDB.open("PlanoSnapDB", 1); r.onupgradeneeded = e => e.target.result.createObjectStore("mesas", { keyPath: "id" }); r.onsuccess = e => db = e.target.result; } iniciarDB();

        function sincronizarVistaActual() { if (vistaActualIdx < 0 || !imagenCargada) return; let v = mesaActual.vistas[vistaActualIdx]; v.nombre = document.getElementById('inputNombreVista').value || `Vista ${vistaActualIdx + 1}`; v.notas = document.getElementById('inputNotasVista').value; v.cotas = JSON.parse(JSON.stringify(cotas)); v.angulos = JSON.parse(JSON.stringify(angulos)); v.isFlattened = isFlattened; v.pixelesPorCm = pixelesPorCm; v.imagenSrc = imagenCargada.src; }

        function cargarVistaEnCanvas(idx) {

        document.getElementById('inputImagen').addEventListener('change', e => { const f = e.target.files[0]; if (!f) return; const i = new Image(); i.onload = () => { let tc = document.createElement('canvas'); tc.width = i.width; tc.height = i.height; tc.getContext('2d').drawImage(i, 0, 0); let u = tc.toDataURL('image/jpeg', 0.8); mesaActual.vistas.push({ id: Date.now(), nombre: `Vista ${mesaActual.vistas.length + 1}`, notas: "", imagenSrc: u, isFlattened: false, pixelesPorCm: 1, cotas: [], angulos: [] }); vistaActualIdx = mesaActual.vistas.length - 1; imagenCargada = i; canvas.width = i.width; canvas.height = i.height; cotas = []; angulos = []; tempPuntos = []; modoCota = 'dibujar'; bloquearClics = false; cotaSeleccionadaIdx = -1; angSelIdx = -1; calibracionMode = false; isFlattened = false; window.tempP1 = null; window.tempAngulo = []; historial = []; guardarEstado(); document.getElementById('inputNombreMesa').value = mesaActual.nombre; document.getElementById('inputNombreVista').value = mesaActual.vistas[vistaActualIdx].nombre; document.getElementById('inputNotasVista').value = ""; document.getElementById('herramientas').style.display = 'block'; document.getElementById('btnAplanar').disabled = true; document.getElementById('btnAplanarToggle').classList.remove('activo'); document.getElementById('panelAplanar').style.display = 'none'; document.getElementById('panelEdicion').style.display = 'none'; centrarImagen(); actualizarUIVistas(); dibujar(); document.getElementById('estado').innerText = "Modo Dibujo."; }; i.src = URL.createObjectURL(f); e.target.value = ""; });

        function esCuadrilateroConvexo(puntos) {
            if (puntos.length !== 4) return false;
            
            // Calcula los productos cruzados para verificar convexidad
            function productoCruz(a, b, c) {
                return (b.x - a.x)*(c.y - a.y) - (b.y - a.y)*(c.x - a.x);
            }
            
            const p1 = puntos[0], p2 = puntos[1], p3 = puntos[2], p4 = puntos[3];
            
            // Verificar orientación de los triángulos
            const o1 = productoCruz(p1, p2, p3);
            const o2 = productoCruz(p2, p3, p4);
            const o3 = productoCruz(p3, p4, p1);
            const o4 = productoCruz(p4, p1, p2);
            
            // Todos deben tener el mismo signo para ser convexo
            return (o1 * o2 > 0) && (o2 * o3 > 0) && (o3 * o4 > 0);

        function dibujarAngulo(a, sel) {
            if (!verLineas && !verTextos && !sel) return;

        function aplanarPlano() {
            if (tempPuntos.length !== 4) { alert("Se necesitan exactamente 4 puntos de calibración."); return; }
            if (typeof cv === 'undefined') { alert("OpenCV no se ha cargado correctamente. Recarga la página."); return; }

            // Verify points form a convex quadrilateral
            if (!esCuadrilateroConvexo(tempPuntos)) { 
                alert("Los puntos deben formar un cuadrilátero convexo (sin ángulos mayores a 180°)."); 
                return; 
            }

            setTimeout(() => {
                try {
                    console.log('Puntos de calibración:', tempPuntos);
                    console.log('Medidas:', i1, i2);
                    let src = cv.matFromArray(4, 1, cv.CV_32FC2, [tempPuntos[0].x, tempPuntos[0].y, tempPuntos[1].x, tempPuntos[1].y, tempPuntos[2].x, tempPuntos[2].y, tempPuntos[3].x, tempPuntos[3].y]);

                    let M = cv.getPerspectiveTransform(src, dst);
                    let imgCanvas = document.createElement('canvas'); imgCanvas.width = canvas.width; imgCanvas.height = canvas.height; imgCanvas.getContext('2d').drawImage(imagenCargada, 0, 0);

                    let maxX = Math.max(transformedCorners.data32F[0], transformedCorners.data32F[2], transformedCorners.data32F[4], transformedCorners.data32F[6]);
                    let maxY = Math.max(transformedCorners.data32F[1], transformedCorners.data32F[3], transformedCorners.data32F[5], transformedCorners.data32F[7]);

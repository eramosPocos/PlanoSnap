<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlanoSnap - v3.0 Pro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f0f0f0;
            padding: 10px;
            margin: 0;
            font-size: 14px;
        }

        #miCanvas {
            border: 2px solid #333;
            background: #eee;
            touch-action: none;
            display: block;
            margin: 0 auto;
            cursor: crosshair;
        }

        .controles {
            margin: 10px 0;
            padding: 15px;
            background: white;
            border-radius: 8px;
            display: inline-block;
            text-align: left;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 95vw;
        }

        button {
            padding: 8px 10px;
            margin: 2px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f9f9f9;
            cursor: pointer;
        }

        button:disabled {
            background: #eee;
            color: #aaa;
            cursor: default;
        }

        button.activo {
            background: #007bff;
            color: white;
            border-color: #0056b3;
        }

        button.peligro {
            background: #ffdddd;
            color: #900;
            border-color: #ff9999;
        }

        input,
        textarea,
        select {
            padding: 8px;
            margin: 5px;
            font-size: 14px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100px;
        }

        textarea {
            width: 100%;
            resize: vertical;
            min-height: 40px;
            font-family: Arial, sans-serif;
        }

        #resultado {
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-top: 10px;
            min-height: 20px;
            font-family: monospace;
            background: #e9ecef;
            padding: 8px;
            border-radius: 4px;
            word-wrap: break-word;
        }

        #estado {
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            display: block;
            font-size: 13px;
        }

        #loading {
            color: red;
            font-size: 20px;
            display: none;
        }

        .botonera {
            margin-top: 10px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }

        .fila {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }

        #panelEdicion {
            background: #e6f7ff;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
            border: 1px solid #b3d9ff;
        }

        #panelAplanar {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
            border: 1px solid #ccc;
        }

        .titulo-seccion {
            font-size: 11px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
        }

        .mesa-header {
            background: #2c3e50;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .mesa-header input {
            background: #ecf0f1;
            color: #333;
            border: none;
            font-weight: bold;
        }

        .vista-nav {
            background: #34495e;
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>

    <div class="controles" style="max-width: 600px;">
        <div class="mesa-header">
            <div class="fila">
                <input type="text" id="inputNombreMesa" placeholder="Nombre del Trabajo" style="flex: 1; width: auto;">
                <button id="btnGuardarMesa" title="Guardar">💾 Guardar</button>
                <button id="btnCargarMesa" title="Cargar">📂 Cargar</button>
                <select id="selectMesaCargar" style="display:none; flex:1; font-size:13px; padding:8px; color: #333;">
                    <option value="-1">-- Selecciona --</option>
                </select>
                <button id="btnCancelarCarga" style="display:none;" class="peligro">✖</button>
                <button id="btnExportarMesa" title="Descargar proyecto como archivo">📤 Exportar</button>
                <button id="btnImportarMesa" title="Cargar proyecto desde archivo">📥 Importar</button>
                <input type="file" id="inputArchivoMesa" accept=".planosnap,.json" style="display: none;">
            </div>
        </div>

        <div class="vista-nav" id="navVistas">
            <button id="btnVistaAnt" style="background:#2c3e50; color:white; border-color:white;">◀</button>
            <div style="text-align:center; flex:1; min-width: 150px;">
                <div id="txtVistaActual" style="font-weight:bold;">Sin vistas</div>
                <input type="text" id="inputNombreVista" placeholder="Nombre Vista"
                    style="width: 80%; text-align:center; font-size:12px; margin:2px;">
                <textarea id="inputNotasVista" placeholder="Notas..." rows="1"
                    style="font-size:11px; margin-top:4px;"></textarea>
            </div>
            <button id="btnVistaSig" style="background:#2c3e50; color:white; border-color:white;">▶</button>
            <button id="btnAddVista" style="background:#27ae60; color:white; border:none; margin-left:5px;"
                title="Añadir foto">+ Foto</button>
        </div>

        <span id="estado">Pulsa '+ Foto' para empezar.</span><br>
        <input type="file" id="inputImagen" accept="image/*" style="display: none;">

        <div class="botonera" id="herramientas" style="display:none;">
            <div class="titulo-seccion">Herramientas</div>
            <div class="fila">
                <button id="btnDibujar" class="activo">📏 Dibujar</button>
                <button id="btnSeleccionar">✏️ Editar</button>
                <button id="btnDeshacer">⬅ Deshacer</button>
                <button id="btnLimpiarVista" class="peligro">🗑️ Borrar Vista</button>
            </div>
            <div class="fila" style="margin-top:5px;">
                <button id="btnMover">✋ Mover</button>
                <button id="btnZoomIn">🔍+</button>
                <button id="btnZoomOut">🔍-</button>
                <button id="btnAplanarToggle">📐 Aplanar</button>
            </div>

            <div id="panelEdicion">
                <strong>Cota Seleccionada:</strong><br>
                <span>Yo digo (cm):</span> <input type="number" id="inputManual" step="0.1" placeholder="Manual">
                <button id="btnAplicarManual">Aplicar</button>
                <button id="btnBorrarManual" class="peligro">Borrar</button>
            </div>

            <div id="panelAplanar">
                <div class="titulo-seccion">Calibración de Perspectiva</div>
                <div class="fila">
                    <span>Medida 1:</span> <input type="number" id="anchoReal" step="0.1">
                    <span>Medida 2:</span> <input type="number" id="altoReal" step="0.1">
                </div>
                <button id="btnAplanar" disabled style="width:100%; margin-top:5px;">Calcular y Aplanar</button>
            </div>
        </div>
    </div>

    <canvas id="miCanvas" width="800" height="600"></canvas>
    <div id="resultado">Esperando...</div>
    <div id="loading">Cargando motor IA...</div>

    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>

    <script>
        const canvas = document.getElementById('miCanvas');
        const ctx = canvas.getContext('2d');

        let imagenCargada = null, bloquearClics = false, isFlattened = false;
        let cotas = [], tempPuntos = [], modoCota = 'dibujar', cotaSeleccionadaIdx = -1, calibracionMode = false;
        let isDraggingEndpoint = false, draggingCotaIdx = -1, draggingPointIdx = -1;
        let scale = 1, offsetX = 0, offsetY = 0, modoMover = false, arrastrando = false, startDragX, startDragY;
        let isPointing = false, currentImgX = 0, currentImgY = 0, currentScreenX = 0, currentScreenY = 0, pixelesPorCm = 1;
        let lastValidLockedPoint = null, isAnchoredVisually = false, lockTimer = null, pointerIsDown = false;
        const LOCK_DELAY = 500, MAX_HISTORIAL = 15;

        let mesaActual = { nombre: "Sin título", vistas: [] };
        let vistaActualIdx = -1, historial = [];
        let db;
        function iniciarDB() {
            let request = indexedDB.open("PlanoSnapDB", 1);
            request.onupgradeneeded = e => e.target.result.createObjectStore("mesas", { keyPath: "id" });
            request.onsuccess = e => db = e.target.result;
        }
        iniciarDB();

        function sincronizarVistaActual() {
            if (vistaActualIdx < 0 || !imagenCargada) return;
            let v = mesaActual.vistas[vistaActualIdx];
            v.nombre = document.getElementById('inputNombreVista').value || `Vista ${vistaActualIdx + 1}`;
            v.notas = document.getElementById('inputNotasVista').value;
            v.cotas = JSON.parse(JSON.stringify(cotas));
            v.isFlattened = isFlattened;
            v.pixelesPorCm = pixelesPorCm;
            // PROHIBIDO usar toDataURL aquí para no quemar las cotas
        }
        function cargarVistaEnCanvas(idx) {
            if (idx < 0 || idx >= mesaActual.vistas.length) return;
            vistaActualIdx = idx; // <-- ESTA ES LA LÍNEA QUE FALTABA
            bloquearClics = true; document.getElementById('estado').innerText = "Cargando vista...";
            let v = mesaActual.vistas[idx], imgTemp = new Image();
            imgTemp.onload = () => {
                imagenCargada = imgTemp; canvas.width = imgTemp.width; canvas.height = imgTemp.height;
                cotas = JSON.parse(JSON.stringify(v.cotas)); isFlattened = v.isFlattened; pixelesPorCm = v.pixelesPorCm;
                document.getElementById('inputNombreVista').value = v.nombre;
                document.getElementById('inputNotasVista').value = v.notas || "";
                historial = []; guardarEstado(); cotaSeleccionadaIdx = -1; tempPuntos = []; calibracionMode = false;
                document.getElementById('panelAplanar').style.display = 'none'; document.getElementById('btnAplanarToggle').classList.remove('activo');
                mostrarPanelEdicion(-1); document.getElementById('herramientas').style.display = 'block';
                centrarImagen(); dibujar(); bloquearClics = false; actualizarUIVistas();
                document.getElementById('estado').innerText = `Modo Dibujo. (${v.nombre})`;
            };
            imgTemp.src = v.imagenSrc;
        }

        function actualizarUIVistas() {
            document.getElementById('txtVistaActual').innerText = vistaActualIdx >= 0 ? `${vistaActualIdx + 1} / ${mesaActual.vistas.length}` : "Sin vistas";
        }

        document.getElementById('btnAddVista').addEventListener('click', () => { sincronizarVistaActual(); document.getElementById('inputImagen').click(); });

        document.getElementById('inputImagen').addEventListener('change', e => {
            const file = e.target.files[0]; if (!file) return;
            const img = new Image();
            img.onload = () => {
                // 1. Convertimos a DataURL para que se guarde bien en la base de datos
                let tc = document.createElement('canvas'); tc.width = img.width; tc.height = img.height;
                tc.getContext('2d').drawImage(img, 0, 0);
                let imgDataUrl = tc.toDataURL('image/jpeg', 0.8);

                // 2. Guardamos la vista con la foto LIMPIA
                mesaActual.vistas.push({ id: Date.now(), nombre: `Vista ${mesaActual.vistas.length + 1}`, notas: "", imagenSrc: imgDataUrl, isFlattened: false, pixelesPorCm: 1, cotas: [] });
                vistaActualIdx = mesaActual.vistas.length - 1;

                imagenCargada = img; canvas.width = img.width; canvas.height = img.height;
                cotas = []; tempPuntos = []; modoCota = 'dibujar'; bloquearClics = false; cotaSeleccionadaIdx = -1; calibracionMode = false; isFlattened = false; window.tempP1 = null; historial = [];
                guardarEstado();
                document.getElementById('inputNombreMesa').value = mesaActual.nombre;
                document.getElementById('inputNombreVista').value = mesaActual.vistas[vistaActualIdx].nombre;
                document.getElementById('inputNotasVista').value = "";
                document.getElementById('herramientas').style.display = 'block'; document.getElementById('btnAplanar').disabled = true;
                document.getElementById('btnAplanarToggle').classList.remove('activo'); document.getElementById('panelAplanar').style.display = 'none'; document.getElementById('panelEdicion').style.display = 'none';
                centrarImagen(); actualizarUIVistas(); dibujar(); document.getElementById('estado').innerText = "Modo Dibujo. Toca dos puntos.";
            };
            img.src = URL.createObjectURL(file); e.target.value = "";
        });
        document.getElementById('btnVistaAnt').addEventListener('click', () => { if (vistaActualIdx > 0) { sincronizarVistaActual(); cargarVistaEnCanvas(vistaActualIdx - 1); } });
        document.getElementById('btnVistaSig').addEventListener('click', () => { if (vistaActualIdx < mesaActual.vistas.length - 1) { sincronizarVistaActual(); cargarVistaEnCanvas(vistaActualIdx + 1); } });

        document.getElementById('btnGuardarMesa').addEventListener('click', () => {
            if (!mesaActual.vistas.length) { alert("No hay vistas."); return; }
            sincronizarVistaActual(); mesaActual.nombre = document.getElementById('inputNombreMesa').value || "Sin título";
            mesaActual.id = mesaActual.id || Date.now();
            db.transaction("mesas", "readwrite").objectStore("mesas").put(mesaActual);
            document.getElementById('estado').innerText = `¡Mesa '${mesaActual.nombre}' guardada!`;
        });

        document.getElementById('btnCargarMesa').addEventListener('click', () => {
            db.transaction("mesas", "readonly").objectStore("mesas").getAll().onsuccess = e => {
                let mesas = e.target.result; if (!mesas.length) { alert("No hay trabajos."); return; }
                let sel = document.getElementById('selectMesaCargar'); sel.innerHTML = '<option value="-1">-- Selecciona --</option>';
                mesas.forEach((m, i) => { let o = document.createElement('option'); o.value = i; o.textContent = `${m.nombre} (${m.vistas.length} vistas)`; sel.appendChild(o); });
                document.getElementById('btnCargarMesa').style.display = 'none'; sel.style.display = 'block'; document.getElementById('btnCancelarCarga').style.display = 'block';
            };
        });

        document.getElementById('selectMesaCargar').addEventListener('change', e => {
            let idx = parseInt(e.target.value); if (idx < 0) return;
            db.transaction("mesas", "readonly").objectStore("mesas").getAll().onsuccess = ev => {
                let mesas = ev.target.result; if (idx >= 0 && idx < mesas.length) { mesaActual = mesas[idx]; vistaActualIdx = 0; document.getElementById('inputNombreMesa').value = mesaActual.nombre; cargarVistaEnCanvas(0); }
                ocultarSelectorCarga();
            };
        });
        document.getElementById('btnCancelarCarga').addEventListener('click', ocultarSelectorCarga);
        function ocultarSelectorCarga() { document.getElementById('btnCargarMesa').style.display = 'block'; document.getElementById('selectMesaCargar').style.display = 'none'; document.getElementById('btnCancelarCarga').style.display = 'none'; }


        // --- SISTEMA DE EXPORTACIÓN / IMPORTACIÓN DE ARCHIVOS ---
        document.getElementById('btnExportarMesa').addEventListener('click', () => {
            if (!mesaActual.vistas.length) { alert("No hay vistas que exportar."); return; }
            sincronizarVistaActual(); // Aseguramos que la vista actual está guardada en memoria

            // Convertimos el objeto "mesa" a texto JSON
            let datosJSON = JSON.stringify(mesaActual);

            // Creamos un archivo virtual para descargar
            let blob = new Blob([datosJSON], { type: "application/json" });
            let url = URL.createObjectURL(blob);

            let a = document.createElement('a');
            a.href = url;
            // Ponemos un nombre bonito al archivo, sin espacios ni acentos raros
            let nombreLimpio = mesaActual.nombre.replace(/[^a-zA-Z0-9]/g, '_');
            a.download = `${nombreLimpio}.planosnap`;

            document.body.appendChild(a);
            a.click(); // Forzamos la descarga
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            document.getElementById('estado').innerText = `¡Proyecto descargado! (${(blob.size / 1024 / 1024).toFixed(2)} MB)`;
        });

        document.getElementById('btnImportarMesa').addEventListener('click', () => {
            document.getElementById('inputArchivoMesa').click();
        });

        document.getElementById('inputArchivoMesa').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;

            let reader = new FileReader();
            reader.onload = function (ev) {
                try {
                    // Leemos el texto y lo convertimos de vuelta a objeto
                    let mesaImportada = JSON.parse(ev.target.result);

                    if (!mesaImportada.vistas || !mesaImportada.vistas.length) {
                        alert("El archivo no parece un proyecto de PlanoSnap válido.");
                        return;
                    }

                    // Cargamos la mesa importada
                    mesaActual = mesaImportada;
                    vistaActualIdx = 0;
                    document.getElementById('inputNombreMesa').value = mesaActual.nombre;

                    cargarVistaEnCanvas(0);
                    document.getElementById('estado').innerText = `¡Proyecto "${mesaActual.nombre}" importado correctamente!`;
                } catch (error) {
                    alert("Error al leer el archivo: " + error.message);
                }
            };
            reader.readAsText(file);
            e.target.value = ""; // Reseteamos por si queremos cargar el mismo archivo otra vez
        });


        document.getElementById('btnLimpiarVista').addEventListener('click', () => { if (!confirm("¿Borrar cotas de esta vista?") || !cotas.length) return; guardarEstado(); cotas = []; cotaSeleccionadaIdx = -1; window.tempP1 = null; document.getElementById('panelEdicion').style.display = 'none'; actualizarResultado(); dibujar(); });

        function guardarEstado() { if (vistaActualIdx < 0) return; historial.push({ cotas: JSON.parse(JSON.stringify(cotas)), isFlattened, pixelesPorCm, imgSrc: imagenCargada.src }); if (historial.length > MAX_HISTORIAL) historial.shift(); }
        function onOpenCvReady() { document.getElementById('loading').style.display = 'none'; }

        document.getElementById('btnMover').addEventListener('click', function () { modoMover = !modoMover; this.classList.toggle('activo'); canvas.style.cursor = modoMover ? 'grab' : 'crosshair'; });
        document.getElementById('btnZoomIn').addEventListener('click', () => { scale *= 1.3; dibujar(); });
        document.getElementById('btnZoomOut').addEventListener('click', () => { scale /= 1.3; if (scale < 0.5) scale = 0.5; dibujar(); });

        document.getElementById('btnAplanarToggle').addEventListener('click', function () {
            calibracionMode = !calibracionMode; this.classList.toggle('activo');
            document.getElementById('panelAplanar').style.display = calibracionMode ? 'block' : 'none';
            if (calibracionMode) { tempPuntos = []; document.getElementById('estado').innerText = "MODO CALIBRACIÓN: Marca 4 esquinas."; } else { tempPuntos = []; document.getElementById('btnAplanar').disabled = true; document.getElementById('estado').innerText = "Modo Dibujo."; }
            dibujar();
        });

        document.getElementById('btnDibujar').addEventListener('click', function () {
            calibracionMode = false; document.getElementById('panelAplanar').style.display = 'none'; document.getElementById('btnAplanarToggle').classList.remove('activo');
            modoCota = 'dibujar'; this.classList.add('activo'); document.getElementById('btnSeleccionar').classList.remove('activo');
            document.getElementById('panelEdicion').style.display = 'none'; cotaSeleccionadaIdx = -1; canvas.style.cursor = 'crosshair'; tempPuntos = []; window.tempP1 = null;
            document.getElementById('estado').innerText = "Modo Dibujo. Toca inicio y fin."; dibujar();
        });

        document.getElementById('btnSeleccionar').addEventListener('click', function () {
            calibracionMode = false; document.getElementById('panelAplanar').style.display = 'none'; document.getElementById('btnAplanarToggle').classList.remove('activo');
            modoCota = 'seleccionar'; this.classList.add('activo'); document.getElementById('btnDibujar').classList.remove('activo');
            cotaSeleccionadaIdx = -1; document.getElementById('estado').innerText = "Modo Edición."; canvas.style.cursor = 'pointer'; dibujar();
        });

        document.getElementById('btnAplicarManual').addEventListener('click', () => { if (cotaSeleccionadaIdx >= 0) { guardarEstado(); cotas[cotaSeleccionadaIdx].manualCm = document.getElementById('inputManual').value === "" ? null : parseFloat(document.getElementById('inputManual').value); mostrarPanelEdicion(cotaSeleccionadaIdx); actualizarResultado(); dibujar(); } });
        document.getElementById('btnBorrarManual').addEventListener('click', () => { if (cotaSeleccionadaIdx >= 0) { guardarEstado(); cotas[cotaSeleccionadaIdx].manualCm = null; mostrarPanelEdicion(cotaSeleccionadaIdx); actualizarResultado(); dibujar(); } });

        document.getElementById('btnDeshacer').addEventListener('click', () => {
            if (calibracionMode && tempPuntos.length > 0) { tempPuntos.pop(); dibujar(); document.getElementById('btnAplanar').disabled = tempPuntos.length !== 4; return; }
            if (modoCota === 'dibujar' && window.tempP1) { window.tempP1 = null; document.getElementById('estado').innerText = "Punto cancelado."; dibujar(); return; }
            if (!historial.length) { document.getElementById('estado').innerText = "Nada que deshacer."; return; }
            bloquearClics = true; let ant = historial.pop(); cotas = ant.cotas; isFlattened = ant.isFlattened; pixelesPorCm = ant.pixelesPorCm; cotaSeleccionadaIdx = -1; mostrarPanelEdicion(-1);
            if (imagenCargada.src !== ant.imgSrc) { let img = new Image(); img.onload = () => { imagenCargada = img; canvas.width = img.width; canvas.height = img.height; bloquearClics = false; actualizarResultado(); centrarImagen(); dibujar(); document.getElementById('estado').innerText = "¡Deshecho!"; }; img.src = ant.imgSrc; }
            else { bloquearClics = false; actualizarResultado(); dibujar(); document.getElementById('estado').innerText = "¡Deshecho!"; }
        });

        document.getElementById('btnAplanar').addEventListener('click', () => { guardarEstado(); aplanarPlano(); });

        function mostrarPanelEdicion(idx) { cotaSeleccionadaIdx = idx; let p = document.getElementById('panelEdicion'); if (idx >= 0) { document.getElementById('inputManual').value = cotas[idx].manualCm !== null ? cotas[idx].manualCm : ''; p.style.display = 'block'; } else { p.style.display = 'none'; } actualizarResultado(); }

        function actualizarResultado() {
            if (!cotas.length) { document.getElementById('resultado').innerText = "Sin cotas."; return; }
            document.getElementById('resultado').innerText = cotas.map((c, i) => {
                let v = "N/A";
                if (c.manualCm !== null) v = c.manualCm.toFixed(2) + " (M)";
                else if (isFlattened && c.calcCm > 0) v = c.calcCm.toFixed(2);
                let s = i === cotaSeleccionadaIdx ? ">>> " : ""; let sf = i === cotaSeleccionadaIdx ? " <<<" : "";
                return `${s}C${i + 1}: ${v}${sf}`;
            }).join(" | ");
        }
        function getImgCoords(e) { let r = canvas.getBoundingClientRect(), cx = canvas.width / r.width, cy = canvas.height / r.height, sx = (e.clientX - r.left) * cx, sy = (e.clientY - r.top) * cy; return { imgX: (sx - offsetX) / scale, imgY: (sy - offsetY) / scale, screenX: sx, screenY: sy }; }

        canvas.addEventListener('pointerdown', e => {
            if (!imagenCargada || bloquearClics) return; pointerIsDown = true; lastValidLockedPoint = null; isAnchoredVisually = false;
            if (modoMover) { arrastrando = true; startDragX = e.clientX - offsetX; startDragY = e.clientY - offsetY; canvas.style.cursor = 'grabbing'; return; }
            if (calibracionMode && tempPuntos.length < 4) { activarLupa(getImgCoords(e)); return; }
            if (modoCota === 'seleccionar') {
                let co = getImgCoords(e), ul = 40 / scale, idx = -1, dm = Infinity;

        canvas.addEventListener('pointerup', e => {
            pointerIsDown = false; if (arrastrando) { arrastrando = false; canvas.style.cursor = modoMover ? 'grab' : 'crosshair'; return; }

                let ti = draggingCotaIdx; isDraggingEndpoint = false; draggingCotaIdx = -1; draggingPointIdx = -1; isPointing = false; lastValidLockedPoint = null; isAnchoredVisually = false;

            }

                isPointing = false; lastValidLockedPoint = null; isAnchoredVisually = false;
                if (calibracionMode) { tempPuntos.push({ x: fx, y: fy }); dibujar(); if (tempPuntos.length === 4) { document.getElementById('btnAplanar').disabled = false; document.getElementById('estado').innerText = "¡4 puntos listos!"; } }
                else if (modoCota === 'dibujar') {
                    if (!window.tempP1) { window.tempP1 = { x: fx, y: fy }; document.getElementById('estado').innerText = "Toca segundo punto."; }
                    else { guardarEstado(); let nc = { p1: window.tempP1, p2: { x: fx, y: fy }, calcCm: 0, manualCm: null }; if (isFlattened) nc.calcCm = Math.hypot(nc.p2.x - nc.p1.x, nc.p2.y - nc.p1.y) / pixelesPorCm; cotas.push(nc); window.tempP1 = null; document.getElementById('estado').innerText = "Cota creada."; actualizarResultado(); dibujar(); }

        function seleccionarCotaConCoords(x, y) { let u = 40 / scale; cotaSeleccionadaIdx = -1; for (let i = 0; i < cotas.length; i++) { if (distanciaPuntoASegmento(x, y, cotas[i].p1.x, cotas[i].p1.y, cotas[i].p2.x, cotas[i].p2.y) < u) { cotaSeleccionadaIdx = i; break; } } document.getElementById('estado').innerText = cotaSeleccionadaIdx >= 0 ? "Cota seleccionada." : "Modo Edición."; mostrarPanelEdicion(cotaSeleccionadaIdx); dibujar(); }
        function distanciaPuntoASegmento(px, py, x1, y1, x2, y2) { let A = px - x1, B = py - y1, C = x2 - x1, D = y2 - y1, d = A * C + B * D, l = C * C + D * D, p = l !== 0 ? d / l : -1, xx, yy; if (p < 0) { xx = x1; yy = y1; } else if (p > 1) { xx = x2; yy = y2; } else { xx = x1 + p * C; yy = y1 + p * D; } return Math.hypot(px - xx, py - yy); }

        function dibujar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save(); ctx.translate(offsetX, offsetY); ctx.scale(scale, scale);

            if (window.tempP1 && modoCota === 'dibujar' && !isDraggingEndpoint) { ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(window.tempP1.x, window.tempP1.y, 8, 0, Math.PI * 2); ctx.fill(); }
            cotas.forEach((c, i) => dibujarCota(c, i === cotaSeleccionadaIdx));

        }

        function dibujarCota(c, sel) {
            let g = Math.max(3, canvas.width / 200);
            ctx.strokeStyle = sel ? '#00ff00' : 'red';
            ctx.lineWidth = sel ? g * 1.5 : g;
            ctx.beginPath(); ctx.moveTo(c.p1.x, c.p1.y); ctx.lineTo(c.p2.x, c.p2.y); ctx.stroke();

            let rect = canvas.getBoundingClientRect();
            let relacionPantallaLienzo = canvas.width / rect.width;
            let tamanoEnPantalla = 16;
            let fs = (tamanoEnPantalla * relacionPantallaLienzo) / scale;
            let p = (4 * relacionPantallaLienzo) / scale;
            let offsetDesplazamiento = (10 * relacionPantallaLienzo) / scale;

            // NUEVA LÓGICA DE TEXTO LIMPIA
            let t1 = "", t2 = "", c1 = "#888", c2 = "#0055cc";
            let tieneFoto = isFlattened && c.calcCm > 0;
            let tieneManual = c.manualCm !== null;

            if (tieneManual && tieneFoto) {
                t1 = c.calcCm.toFixed(2) + " cm (Foto)"; c1 = "#cc0000";
                t2 = c.manualCm.toFixed(2) + " cm (Manual)";
            } else if (tieneFoto) {
                t1 = c.calcCm.toFixed(2) + " cm (Foto)"; c1 = "#cc0000";
            } else if (tieneManual) {
                t1 = c.manualCm.toFixed(2) + " cm (Manual)"; c1 = "#0055cc";
            } else {

            let m1 = ctx.measureText(t1), m2 = t2 ? ctx.measureText(t2) : { width: 0 };
            let ch = (fs * (t2 ? 2 : 1)) + (p * 2) + (2 * relacionPantallaLienzo) / scale;
            let mw = Math.max(m1.width, m2.width);

            let textX = mx, textY = my;

            }
        }
        function dibujarLupa(ix, iy, sx, sy) {
            let r = canvas.getBoundingClientRect(), cc = canvas.width / r.width, rl = 80 * cc, z = 2.5, lx = sx, ly = 120 * cc;
            if (lx < rl + 10) lx = rl + 10; if (lx > canvas.width - rl - 10) lx = canvas.width - rl - 10;

            ctx.beginPath(); ctx.moveTo(lx, ly - tm); ctx.lineTo(lx, ly - 6 * cc); ctx.stroke(); ctx.beginPath(); ctx.moveTo(lx, ly + 6 * cc); ctx.lineTo(lx, ly + tm); ctx.stroke();

            if (il) { ctx.font = `bold ${14 * cc}px Arial`; ctx.fillStyle = '#00ff00'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText("ANCLADO", lx, ly + tm + 15 * cc); }
        }

        function aplanarPlano() {
            if (tempPuntos.length !== 4 || typeof cv === 'undefined') { alert("Faltan 4 puntos o OpenCV."); return; }
            let i1 = parseFloat(document.getElementById('anchoReal').value), i2 = parseFloat(document.getElementById('altoReal').value);
            if (isNaN(i1) || isNaN(i2)) { alert("Introduce medidas reales."); return; }
            bloquearClics = true; document.getElementById('estado').innerText = "Calculando...";
            setTimeout(() => {
                try {
                    let tc = document.createElement('canvas'); tc.width = imagenCargada.width; tc.height = imagenCargada.height; let tctx = tc.getContext('2d'); tctx.drawImage(imagenCargada, 0, 0); let src = cv.imread(tc);
                    let st = cv.matFromArray(4, 1, cv.CV_32FC2, [tempPuntos[0].x, tempPuntos[0].y, tempPuntos[1].x, tempPuntos[1].y, tempPuntos[2].x, tempPuntos[2].y, tempPuntos[3].x, tempPuntos[3].y]);
                    let dt = Math.hypot(tempPuntos[1].x - tempPuntos[0].x, tempPuntos[1].y - tempPuntos[0].y), dl = Math.hypot(tempPuntos[3].x - tempPuntos[0].x, tempPuntos[3].y - tempPuntos[0].y);
                    if (dt > dl && i1 < i2) { let t = i1; i1 = i2; i2 = t; } else if (dt < dl && i1 > i2) { let t = i1; i1 = i2; i2 = t; }
                    let ei = (window.innerWidth - 40) / i1, dtr = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, i1 * ei, 0, i1 * ei, i2 * ei, 0, i2 * ei]);
                    let M = cv.getPerspectiveTransform(st, dtr), eo = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, src.cols, 0, src.cols, src.rows, 0, src.rows]), et = new cv.Mat(); cv.perspectiveTransform(eo, et, M);

                    let dst = new cv.Mat(); cv.warpPerspective(src, dst, MF, new cv.Size(na, nalt), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
                    canvas.width = na; canvas.height = nalt; cv.imshow(canvas, dst); let nid = canvas.toDataURL('image/png'); imagenCargada = new Image();
                    imagenCargada.onload = () => {
                        isFlattened = true; bloquearClics = false; tempPuntos = []; calibracionMode = false;
                        document.getElementById('panelAplanar').style.display = 'none';
                        document.getElementById('btnAplanarToggle').classList.remove('activo');

                        // IMPORTANTE: Guardar la imagen aplanada LIMPIA en la vista actual
                        if (vistaActualIdx >= 0) {
                            mesaActual.vistas[vistaActualIdx].imagenSrc = nid;
                        }

                        document.getElementById('estado').innerText = "¡Aplanado!";
                        actualizarResultado(); centrarImagen(); dibujar();
                    };
                    imagenCargada.src = nid; src.delete(); dst.delete(); M.delete(); MF.delete(); T.delete(); TS.delete(); tm.delete(); st.delete(); dtr.delete(); eo.delete(); et.delete();
                } catch (err) { alert("Error: " + err.message); document.getElementById('estado').innerText = "Error."; } finally { bloquearClics = false; }
            }, 100);
        }

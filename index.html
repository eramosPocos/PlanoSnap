<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlanoSnap - v3.1 Pro</title>
    <style>
        /* Layout principal sin saltos */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f0f0f0;
            margin: 0;
            padding: 0;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            /* 100dvh evita los saltos del navegador móvil */
            overflow: hidden;
        }

        /* Controles fijos arriba */
        .controles {
            flex-shrink: 0;
            margin: 5px 5px 0 5px;
            padding: 10px;
            background: white;
            border-radius: 8px;
            display: inline-block;
            text-align: left;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 95vw;
            max-height: 40vh;
            overflow-y: auto;
        }

        button {
            padding: 8px 10px;
            margin: 2px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f9f9f9;
            cursor: pointer;
        }

        button:disabled {
            background: #eee;
            color: #aaa;
            cursor: default;
        }

        button.activo {
            background: #007bff;
            color: white;
            border-color: #0056b3;
        }

        button.peligro {
            background: #ffdddd;
            color: #900;
            border-color: #ff9999;
        }

        input,
        textarea,
        select {
            padding: 8px;
            margin: 5px;
            font-size: 14px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100px;
        }

        textarea {
            width: 100%;
            resize: vertical;
            min-height: 40px;
            font-family: Arial, sans-serif;
        }

        .botonera {
            margin-top: 10px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }

        .fila {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }

        #panelEdicion {
            background: #e6f7ff;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
            border: 1px solid #b3d9ff;
        }

        #panelAplanar {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
            border: 1px solid #ccc;
        }

        .titulo-seccion {
            font-size: 11px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
        }

        .mesa-header {
            background: #2c3e50;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .mesa-header input {
            background: #ecf0f1;
            color: #333;
            border: none;
            font-weight: bold;
        }

        .vista-nav {
            background: #34495e;
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            flex-wrap: wrap;
        }

        /* Contenedor del canvas que ocupa el espacio libre */
        #canvasContainer {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background: #333;
            margin: 5px;
            border-radius: 5px;
        }

        #miCanvas {
            background: #eee;
            touch-action: none;
            cursor: crosshair;
            display: block;
        }

        /* Panel inferior fijo */
        #estado {
            font-weight: bold;
            color: #555;
            margin: 5px;
            display: block;
            font-size: 13px;
            flex-shrink: 0;
            height: 20px;
            line-height: 20px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            /* Si el texto es largo, pone puntos... */
        }

        #resultado {
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin: 0 5px 10px 5px;
            height: 40px;
            /* Altura fija inamovible */
            font-family: monospace;
            background: #e9ecef;
            padding: 8px;
            border-radius: 4px;
            word-wrap: break-word;
            overflow: hidden;
            /* Si hay muchas cotas, corta el texto en lugar de crecer */
            flex-shrink: 0;
        }

        #loading {
            color: red;
            font-size: 20px;
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
        }

        /* LUPA EXTERNA (Flotante) */
        #lupaCanvas {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            pointer-events: none;
            display: none;
            background: #000;
        }
    </style>
</head>

<body>

    <div class="controles" style="max-width: 600px;">
        <div class="mesa-header">
            <div class="fila">
                <input type="text" id="inputNombreMesa" placeholder="Nombre del Trabajo" style="flex: 1; width: auto;">
                <button id="btnGuardarMesa" title="Guardar">💾</button>
                <button id="btnGuardarComo" title="Guardar como">💾+</button>
                <button id="btnCargarMesa" title="Cargar">📂</button>
                <select id="selectMesaCargar" style="display:none; flex:1; font-size:13px; padding:8px; color: #333;">
                    <option value="-1">-- Selecciona --</option>
                </select>
                <button id="btnCancelarCarga" style="display:none;" class="peligro">✖</button>
                <button id="btnBorrarMesa" style="display:none;" class="peligro"
                    title="Borrar proyecto seleccionado">🗑️</button>
                <button id="btnExportarMesa" title="Exportar archivo">📤</button>
                <button id="btnImportarMesa" title="Importar archivo">📥</button>
                <input type="file" id="inputArchivoMesa" accept=".planosnap,.json" style="display: none;">
            </div>
        </div>

        <div class="vista-nav" id="navVistas">
            <button id="btnVistaAnt" style="background:#2c3e50; color:white; border-color:white;">◀</button>
            <div style="text-align:center; flex:1; min-width: 150px;">
                <div id="txtVistaActual" style="font-weight:bold;">Sin vistas</div>
                <input type="text" id="inputNombreVista" placeholder="Nombre Vista"
                    style="width: 80%; text-align:center; font-size:12px; margin:2px;">
                <textarea id="inputNotasVista" placeholder="Notas..." rows="1"
                    style="font-size:11px; margin-top:4px;"></textarea>
            </div>
            <button id="btnVistaSig" style="background:#2c3e50; color:white; border-color:white;">▶</button>
            <button id="btnAddVista" style="background:#27ae60; color:white; border:none; margin-left:5px;"
                title="Añadir foto">+ Foto</button>
        </div>

        <span id="estado">Pulsa '+ Foto' para empezar.</span>
        <input type="file" id="inputImagen" accept="image/*" style="display: none;">

        <div class="botonera" id="herramientas" style="display:none;">
            <div class="titulo-seccion">Herramientas</div>
            <div class="fila">
                <button id="btnDibujar" class="activo">📏 Dibujar</button>
                <button id="btnSeleccionar">✏️ Editar</button>
                <button id="btnDeshacer">⬅ Deshacer</button>
                <button id="btnLimpiarVista" class="peligro">🗑️ Borrar Vista</button>
            </div>
            <div class="fila" style="margin-top:5px;">
                <button id="btnMover">✋ Mover</button>
                <button id="btnZoomIn">🔍+</button>
                <button id="btnZoomOut">🔍-</button>
                <button id="btnAplanarToggle">📐 Aplanar</button>
                <!-- NUEVOS BOTONES -->
                <button id="btnToggleLineas" class="activo" title="Ver/Ocultar Líneas">🟢 Líneas</button>
                <button id="btnToggleTextos" class="activo" title="Ver/Ocultar Números">🟢 Textos</button>
            </div>
            <div id="panelEdicion">
                <strong>Cota Seleccionada:</strong><br>
                <span>Yo digo (cm):</span> <input type="number" id="inputManual" step="0.1" placeholder="Manual">
                <button id="btnAplicarManual">Aplicar</button>
                <button id="btnBorrarManual" class="peligro">Borrar</button>
                <br>
                <span>Nota:</span> <input type="text" id="inputNotaCota" placeholder="Ej: Altura zócalo"
                    style="width: 140px;">
                <button id="btnAplicarNota">Ok</button>
                <button id="btnBorrarNota" class="peligro">X</button>
            </div>
            <div id="panelAplanar">
                <div class="titulo-seccion">Calibración de Perspectiva</div>
                <div class="fila">
                    <span>Medida 1:</span> <input type="number" id="anchoReal" step="0.1">
                    <span>Medida 2:</span> <input type="number" id="altoReal" step="0.1">
                </div>
                <button id="btnAplanar" disabled style="width:100%; margin-top:5px;">Calcular y Aplanar</button>
            </div>
        </div>
    </div>

    <!-- Contenedor que se adapta al espacio libre sin dar saltos -->
    <div id="canvasContainer">
        <canvas id="miCanvas" width="800" height="600"></canvas>
        <div id="loading">Cargando motor IA...</div>
    </div>

    <span id="estado">Esperando...</span>
    <div id="resultado">Sin cotas.</div>

    <!-- LUPA FLOTANTE INDEPENDIENTE -->
    <canvas id="lupaCanvas" width="300" height="300"></canvas>

    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>

    <script>
        const canvas = document.getElementById('miCanvas');
        const ctx = canvas.getContext('2d');
        const lupaCanvas = document.getElementById('lupaCanvas');
        const lupaCtx = lupaCanvas.getContext('2d');

        let imagenCargada = null, bloquearClics = false, isFlattened = false;
        let cotas = [], tempPuntos = [], modoCota = 'dibujar', cotaSeleccionadaIdx = -1, calibracionMode = false;
        let verLineas = true;
        let verTextos = true;
        let isDraggingEndpoint = false, draggingCotaIdx = -1, draggingPointIdx = -1;
        let scale = 1, offsetX = 0, offsetY = 0, modoMover = false, arrastrando = false, startDragX, startDragY;
        let isPointing = false, currentImgX = 0, currentImgY = 0, currentScreenX = 0, currentScreenY = 0, pixelesPorCm = 1;
        let lastValidLockedPoint = null, isAnchoredVisually = false, lockTimer = null, pointerIsDown = false;
        const LOCK_DELAY = 500, MAX_HISTORIAL = 15, LUPA_ZOOM = 2.5;
        let cambiosSinGuardar = false;

        let mesaActual = { nombre: "Sin título", vistas: [] };
        let vistaActualIdx = -1, historial = [];
        let db;
        function iniciarDB() {
            let request = indexedDB.open("PlanoSnapDB", 1);
            request.onupgradeneeded = e => e.target.result.createObjectStore("mesas", { keyPath: "id" });
            request.onsuccess = e => db = e.target.result;
        }
        iniciarDB();

        function sincronizarVistaActual() {
            if (vistaActualIdx < 0 || !imagenCargada) return;
            let v = mesaActual.vistas[vistaActualIdx];
            v.nombre = document.getElementById('inputNombreVista').value || `Vista ${vistaActualIdx + 1}`;
            v.notas = document.getElementById('inputNotasVista').value;
            v.cotas = JSON.parse(JSON.stringify(cotas));
            v.isFlattened = isFlattened; v.pixelesPorCm = pixelesPorCm;
        }

        function cargarVistaEnCanvas(idx) {
            if (idx < 0 || idx >= mesaActual.vistas.length) return;

            // 1. ESTA ES LA LÍNEA CLAVE QUE DEBE ESTAR AQUÍ FUERA DEL ONLOAD
            vistaActualIdx = idx;

            bloquearClics = true;
            document.getElementById('estado').innerText = "Cargando vista...";

            let v = mesaActual.vistas[idx], imgTemp = new Image();
            imgTemp.onload = () => {
                imagenCargada = imgTemp;
                canvas.width = imgTemp.width;
                canvas.height = imgTemp.height;

                cotas = JSON.parse(JSON.stringify(v.cotas));
                isFlattened = v.isFlattened;
                pixelesPorCm = v.pixelesPorCm;

                // 2. ACTUALIZAR NOMBRES Y FORZAR EL REFRESCO DEL MÓVIL
                let inpNom = document.getElementById('inputNombreVista');
                inpNom.value = v.nombre;
                inpNom.blur();

                let inpNot = document.getElementById('inputNotasVista');
                inpNot.value = v.notas || "";
                inpNot.blur();

                historial = [];
                guardarEstado();
                cotaSeleccionadaIdx = -1;
                tempPuntos = [];
                calibracionMode = false;

                document.getElementById('panelAplanar').style.display = 'none';
                document.getElementById('btnAplanarToggle').classList.remove('activo');
                mostrarPanelEdicion(-1);
                document.getElementById('herramientas').style.display = 'block';

                centrarImagen();
                dibujar();
                bloquearClics = false;

                // 3. ACTUALIZAR EL ÍNDICE VISUAL (1/2, 2/2...)
                actualizarUIVistas();

                document.getElementById('estado').innerText = `Modo Dibujo. (${v.nombre})`;
            };
            imgTemp.src = v.imagenSrc;
        }


        function actualizarUIVistas() { document.getElementById('txtVistaActual').innerText = vistaActualIdx >= 0 ? `${vistaActualIdx + 1} / ${mesaActual.vistas.length}` : "Sin vistas"; }

        document.getElementById('btnAddVista').addEventListener('click', () => { sincronizarVistaActual(); document.getElementById('inputImagen').click(); });

        document.getElementById('inputImagen').addEventListener('change', e => {
            const file = e.target.files[0]; if (!file) return;
            const img = new Image();
            img.onload = () => {
                let tc = document.createElement('canvas'); tc.width = img.width; tc.height = img.height;
                tc.getContext('2d').drawImage(img, 0, 0); let imgDataUrl = tc.toDataURL('image/jpeg', 0.8);
                mesaActual.vistas.push({ id: Date.now(), nombre: `Vista ${mesaActual.vistas.length + 1}`, notas: "", imagenSrc: imgDataUrl, isFlattened: false, pixelesPorCm: 1, cotas: [] });
                vistaActualIdx = mesaActual.vistas.length - 1;
                imagenCargada = img; canvas.width = img.width; canvas.height = img.height;
                cotas = []; tempPuntos = []; modoCota = 'dibujar'; bloquearClics = false; cotaSeleccionadaIdx = -1; calibracionMode = false; isFlattened = false; window.tempP1 = null; historial = [];
                guardarEstado();
                document.getElementById('inputNombreMesa').value = mesaActual.nombre;
                document.getElementById('inputNombreVista').value = mesaActual.vistas[vistaActualIdx].nombre;
                document.getElementById('inputNotasVista').value = "";
                document.getElementById('herramientas').style.display = 'block'; document.getElementById('btnAplanar').disabled = true;
                document.getElementById('btnAplanarToggle').classList.remove('activo'); document.getElementById('panelAplanar').style.display = 'none'; document.getElementById('panelEdicion').style.display = 'none';
                centrarImagen(); actualizarUIVistas(); dibujar(); document.getElementById('estado').innerText = "Modo Dibujo. Toca dos puntos.";
            };
            img.src = URL.createObjectURL(file); e.target.value = "";
        });

        document.getElementById('btnVistaAnt').addEventListener('click', () => { if (vistaActualIdx > 0) { sincronizarVistaActual(); cargarVistaEnCanvas(vistaActualIdx - 1); } });
        document.getElementById('btnVistaSig').addEventListener('click', () => { if (vistaActualIdx < mesaActual.vistas.length - 1) { sincronizarVistaActual(); cargarVistaEnCanvas(vistaActualIdx + 1); } });

        document.getElementById('btnGuardarMesa').addEventListener('click', () => {
            if (!mesaActual.vistas.length) { alert("No hay vistas."); return; }
            sincronizarVistaActual(); mesaActual.nombre = document.getElementById('inputNombreMesa').value || "Sin título";
            mesaActual.id = mesaActual.id || Date.now();
            db.transaction("mesas", "readwrite").objectStore("mesas").put(mesaActual);
            document.getElementById('estado').innerText = `¡Mesa guardada!`;
            cambiosSinGuardar = false;
        });

        document.getElementById('btnGuardarComo').addEventListener('click', () => {
            if (!mesaActual.vistas.length) { alert("No hay vistas."); return; }
            sincronizarVistaActual();
            mesaActual.nombre = document.getElementById('inputNombreMesa').value || "Sin título";

            // LA MAGIA: Le damos un ID nuevo y distinto al que tenía
            mesaActual.id = Date.now();

            db.transaction("mesas", "readwrite").objectStore("mesas").put(mesaActual);
            cambiosSinGuardar = false;
            document.getElementById('estado').innerText = `¡Creada copia como "${mesaActual.nombre}"!`;
        });

        document.getElementById('btnCargarMesa').addEventListener('click', () => {
            db.transaction("mesas", "readonly").objectStore("mesas").getAll().onsuccess = e => {
                let mesas = e.target.result; if (!mesas.length) { alert("No hay trabajos."); return; }
                let sel = document.getElementById('selectMesaCargar'); sel.innerHTML = '<option value="-1">-- Selecciona --</option>';
                mesas.forEach((m, i) => { let o = document.createElement('option'); o.value = i; o.textContent = `${m.nombre} (${m.vistas.length} vistas)`; sel.appendChild(o); });
                document.getElementById('btnCargarMesa').style.display = 'none'; sel.style.display = 'block'; document.getElementById('btnCancelarCarga').style.display = 'block';
            };
        });
        document.getElementById('selectMesaCargar').addEventListener('change', e => {
            let idx = parseInt(e.target.value); if (idx < 0) return;
            db.transaction("mesas", "readonly").objectStore("mesas").getAll().onsuccess = ev => {
                let mesas = ev.target.result; if (idx >= 0 && idx < mesas.length) { mesaActual = mesas[idx]; vistaActualIdx = 0; document.getElementById('inputNombreMesa').value = mesaActual.nombre; cargarVistaEnCanvas(0); }
                ocultarSelectorCarga();
            };
        });
        document.getElementById('btnCancelarCarga').addEventListener('click', ocultarSelectorCarga);
        function ocultarSelectorCarga() { document.getElementById('btnCargarMesa').style.display = 'block'; document.getElementById('selectMesaCargar').style.display = 'none'; document.getElementById('btnCancelarCarga').style.display = 'none'; }

        // --- ADVERTENCIA AL CERRAR PÁGINA ---
        window.addEventListener('beforeunload', (e) => {
            if (cambiosSinGuardar) {
                e.preventDefault();
                e.returnValue = ''; // Necesario para navegadores modernos
            }
        });

        // --- GESTIÓN DE LISTA Y BORRADO DE PROYECTOS ---
        function cargarListaMesas() {
            db.transaction("mesas", "readonly").objectStore("mesas").getAll().onsuccess = e => {
                let mesas = e.target.result;
                if (!mesas.length) { alert("No hay trabajos guardados."); ocultarSelectorCarga(); return; }
                let sel = document.getElementById('selectMesaCargar'); sel.innerHTML = '<option value="-1">-- Selecciona --</option>';
                mesas.forEach((m, i) => { let o = document.createElement('option'); o.value = i; o.textContent = `${m.nombre} (${m.vistas.length} vistas)`; sel.appendChild(o); });
                document.getElementById('btnCargarMesa').style.display = 'none'; sel.style.display = 'block';
                document.getElementById('btnCancelarCarga').style.display = 'block';
                document.getElementById('btnBorrarMesa').style.display = 'block'; // Mostrar papelera
            };
        }

        // Sobrescribimos el evento de Cargar para usar la nueva función lista
        document.getElementById('btnCargarMesa').removeEventListener('click', () => { }); // Limpieza por seguridad
        document.getElementById('btnCargarMesa').onclick = () => cargarListaMesas();

        document.getElementById('btnBorrarMesa').addEventListener('click', () => {
            let idx = parseInt(document.getElementById('selectMesaCargar').value);
            if (idx < 0) { alert("Selecciona un proyecto de la lista para borrarlo."); return; }
            if (!confirm("¿Seguro que quieres borrar este proyecto permanentemente?")) return;

            db.transaction("mesas", "readonly").objectStore("mesas").getAll().onsuccess = e => {
                let mesas = e.target.result;
                if (idx >= 0 && idx < mesas.length) {
                    let mesaABorrar = mesas[idx];
                    db.transaction("mesas", "readwrite").objectStore("mesas").delete(mesaABorrar.id).onsuccess = () => {
                        // Si el que borramos es el que tenemos abierto, limpiamos la pantalla
                        if (mesaActual.id === mesaABorrar.id) {
                            mesaActual = { nombre: "Sin título", vistas: [] }; vistaActualIdx = -1;
                            imagenCargada = null; cotas = []; historial = []; cambiosSinGuardar = false;
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            document.getElementById('herramientas').style.display = 'none';
                            document.getElementById('inputNombreMesa').value = "";
                            actualizarUIVistas(); actualizarResultado();
                        }
                        document.getElementById('estado').innerText = "Proyecto borrado.";
                        cargarListaMesas(); // Recargamos la lista para que desaparezca el borrado
                    };
                }
            };
        });

        // Exportar / Importar
        document.getElementById('btnExportarMesa').addEventListener('click', () => {
            if (!mesaActual.vistas.length) return; sincronizarVistaActual();
            let blob = new Blob([JSON.stringify(mesaActual)], { type: "application/json" }), url = URL.createObjectURL(blob), a = document.createElement('a');
            a.href = url; a.download = `${mesaActual.nombre.replace(/[^a-zA-Z0-9]/g, '_')}.planosnap`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            document.getElementById('estado').innerText = `¡Exportado! (${(blob.size / 1024 / 1024).toFixed(2)} MB)`;
            cambiosSinGuardar = false; // Marcamos como guardado tras exportar quizá haya que quitarlo
        });
        document.getElementById('btnImportarMesa').addEventListener('click', () => document.getElementById('inputArchivoMesa').click());
        document.getElementById('inputArchivoMesa').addEventListener('change', e => {
            let file = e.target.files[0]; if (!file) return; let reader = new FileReader();
            reader.onload = ev => {
                try {
                    let m = JSON.parse(ev.target.result);
                    if (!m.vistas || !m.vistas.length) { alert("Archivo no válido."); return; }
                    mesaActual = m; vistaActualIdx = 0; document.getElementById('inputNombreMesa').value = m.nombre; cargarVistaEnCanvas(0);
                } catch (err) { alert("Error al leer: " + err.message); }
            }; reader.readAsText(file); e.target.value = "";
        });

        document.getElementById('btnLimpiarVista').addEventListener('click', () => { if (!confirm("¿Borrar cotas?") || !cotas.length) return; guardarEstado(); cotas = []; cotaSeleccionadaIdx = -1; window.tempP1 = null; document.getElementById('panelEdicion').style.display = 'none'; actualizarResultado(); dibujar(); });

        function guardarEstado() {
            if (vistaActualIdx < 0) return;
            cambiosSinGuardar = true; // <-- AQUÍ ESTÁ LA MAGIA CENTRALIZADA
            historial.push({
                cotas: JSON.parse(JSON.stringify(cotas)),
                isFlattened, pixelesPorCm, imgSrc: imagenCargada.src
            });
            if (historial.length > MAX_HISTORIAL) historial.shift();
        }
        function onOpenCvReady() { document.getElementById('loading').style.display = 'none'; }

                    let dst = new cv.Mat(); cv.warpPerspective(src, dst, MF, new cv.Size(na, nalt), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());

                        isFlattened = true; bloquearClics = false; tempPuntos = []; calibracionMode = false;
                        document.getElementById('panelAplanar').style.display = 'none'; document.getElementById('btnAplanarToggle').classList.remove('activo');
                        if (vistaActualIdx >= 0) mesaActual.vistas[vistaActualIdx].imagenSrc = nid; // Guardar limpio
                        document.getElementById('estado').innerText = "¡Aplanado!"; actualizarResultado(); centrarImagen(); dibujar();
                    };
                    imagenCargada.src = nid; src.delete(); dst.delete(); M.delete(); MF.delete(); T.delete(); TS.delete(); tm.delete(); st.delete(); dtr.delete(); eo.delete(); et.delete();
                } catch (err) { alert("Error: " + err.message); document.getElementById('estado').innerText = "Error."; } finally { bloquearClics = false; }
            }, 100);
        }
